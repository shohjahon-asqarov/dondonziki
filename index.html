<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript game</title>

    <!-- styles -->
    <link rel="stylesheet" href="./style.css">
</head>

<body>


    <div class="box">
        <div class="arena">
            <img class="left" src="./images/scissors.png" alt="scissors">
            <img class="right" src="./images/paper.png" alt="paper">
        </div>

        <h1 class="result">Start Game</h1>

        <div class="tools">
            <div>
                <img class="paper" src="/images/paper.png" alt="paper">
                <h3>Paper</h3>
            </div>
            <div>
                <img class="rock" src="/images/rock.png" alt="rock">
                <h3>Rock</h3>
            </div>

            <div>
                <img class="scissors" src="/images/scissors.png" alt="scissors">
                <h3>Scissors</h3>
            </div>
        </div>
    </div>



    <script src="./app.js"></script>
</body>

</html>
